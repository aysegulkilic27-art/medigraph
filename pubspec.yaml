name: diyabetansiyon
description: "Tansiyon ve seker takip uygulamasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hive_flutter: ^1.1.0
  fl_chart: ^1.2.0
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  pdf: ^3.10.8
  printing: ^5.12.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/healthPattern.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

